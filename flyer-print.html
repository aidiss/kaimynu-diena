<!doctype html>
<html lang="lt">
<head>
<meta charset="utf-8" />
<title>Kaimynų diena — Piknikas (A4)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,800;0,9..144,900;1,9..144,600;1,9..144,700;1,9..144,800;1,9..144,900&display=block" rel="stylesheet">
<style>
  :root {
    --cream: #fff8ec;
    --red:   #d8412e;
    --ink:   #2a1a13;
    --sun:   #f4b53a;
    --leaf:  #3d8255;
    --wood:  #c98a48;
    --gingham-stripe: rgba(216, 65, 46, 0.33);
  }

  @page { size: A4 portrait; margin: 0; }

  html, body {
    margin: 0; padding: 0;
    background: var(--cream);
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    font-family: "Fraunces", Georgia, serif;
    color: var(--ink);
  }
  body { width: 210mm; height: 297mm; overflow: hidden; }

  .page { width: 210mm; height: 297mm; overflow: hidden; background: var(--cream); }
  .flyer {
    width: 600px; height: 850px;
    transform: scale(1.3205); transform-origin: top left;
    background: var(--cream);
    display: flex; flex-direction: column;
  }

  .band {
    flex: 0 0 86px;
    background:
      repeating-linear-gradient(0deg,  var(--gingham-stripe) 0 16px, transparent 16px 32px),
      repeating-linear-gradient(90deg, var(--gingham-stripe) 0 16px, transparent 16px 32px),
      var(--cream);
  }

  .content {
    flex: 1;
    padding: 22px 36px;
    display: flex; flex-direction: column;
    gap: 18px;
    min-height: 0;
  }

  /* HERO: title left, sun right */
  .hero { display: flex; align-items: flex-start; gap: 14px; }
  .title-block { flex: 1; min-width: 0; }
  .title-line {
    font-weight: 900; font-size: 72px;
    line-height: 0.92; letter-spacing: -0.02em;
  }
  .title-line.t1 { color: var(--red); font-style: italic; }
  .title-line.t2 { color: var(--ink); margin-top: -2px; }
  .potluck {
    font-style: italic; font-weight: 600;
    font-size: 15px; line-height: 1.3;
    color: var(--leaf);
    margin-top: 10px; max-width: 360px;
  }
  .sun { width: 100px; height: 100px; flex: 0 0 auto; margin-top: 2px; }

  /* DOODLES */
  .doodles-svg { width: 100%; height: 100px; display: block; }

  /* INFO ROW: all text on the left, big QR on the right */
  .info-row {
    margin-top: auto;
    display: flex; align-items: center; gap: 24px;
  }
  .info-text { flex: 1; min-width: 0; }

  .day {
    font-weight: 900; font-style: italic;
    font-size: 68px; line-height: 0.85;
    color: var(--ink);
  }
  .month {
    font-weight: 700; font-size: 14px;
    color: var(--red);
    margin-top: 4px;
    letter-spacing: 0.01em;
  }

  .time-line {
    margin-top: 14px;
    display: flex; align-items: baseline; gap: 12px;
  }
  .time-label {
    font-weight: 700; font-size: 11px;
    color: var(--ink); opacity: 0.6;
    text-transform: uppercase; letter-spacing: 0.18em;
  }
  .time-value {
    font-weight: 900; font-size: 28px;
    color: var(--ink); line-height: 1;
    letter-spacing: -0.01em;
  }

  .music {
    font-style: italic; font-weight: 600;
    font-size: 14px; line-height: 1.35;
    color: var(--leaf);
    margin: 10px 0 0;
  }

  .address-block {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 2px dashed rgba(42, 26, 19, 0.25);
  }
  .place-address {
    font-weight: 800; font-size: 20px;
    line-height: 1.2; color: var(--ink);
  }
  .place-contact {
    font-weight: 600; font-size: 13px;
    color: var(--ink); opacity: 0.7;
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }

  /* BIG QR */
  .qr {
    background: #ffffff;
    padding: 18px;
    border: 2.5px solid var(--ink);
    border-radius: 14px;
    transform: rotate(2deg);
    flex: 0 0 auto;
    box-shadow: 4px 4px 0 rgba(42, 26, 19, 0.10);
  }
  .qr svg { display: block; }
  .qr-caption {
    text-align: center;
    margin-top: 6px;
    font-size: 10px;
    font-weight: 700;
    color: var(--ink);
    opacity: 0.55;
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
</style>
</head>
