<!doctype html>
<html lang="lt">
<head>
<meta charset="utf-8" />
<title>Kaimynų diena — Piknikas (A4)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,800;0,9..144,900;1,9..144,600;1,9..144,700;1,9..144,800;1,9..144,900&display=block" rel="stylesheet">
<style>
  :root {
    --cream: #fff8ec;
    --red:   #d8412e;
    --ink:   #2a1a13;
    --sun:   #f4b53a;
    --leaf:  #3d8255;
    --wood:  #c98a48;
    --gingham-stripe: rgba(216, 65, 46, 0.33);
  }

  @page { size: A4 portrait; margin: 0; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--cream);
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  body {
    width: 210mm;
    height: 297mm;
    overflow: hidden;
    font-family: "Fraunces", Georgia, serif;
    color: var(--ink);
  }

  /* The flyer is authored at 600×850 (A5 ratio 0.706, A4 ratio 0.707).
     Scale to height-fit A4: 297mm / 850px = 1.3205. That makes the visual
     content 792.3×1122.5px = 209.6×297.0mm — fits A4 with no overflow
     (tiny 0.4mm right margin in cream, invisible against the cream bg). */
  .page {
    width: 210mm;
    height: 297mm;
    overflow: hidden;
    position: relative;
    background: var(--cream);
  }
  .flyer {
    width: 600px;
    height: 850px;
    transform: scale(1.3205);
    transform-origin: top left;
    position: relative;
    background: var(--cream);
    color: var(--ink);
  }

  /* Gingham — plain rgba (no color-mix) for max print engine compatibility */
  .gingham {
    position: absolute;
    left: 0; right: 0;
    height: 110px;
    background:
      repeating-linear-gradient(0deg, var(--gingham-stripe) 0 16px, transparent 16px 32px),
      repeating-linear-gradient(90deg, var(--gingham-stripe) 0 16px, transparent 16px 32px),
      var(--cream);
  }
  .gingham.top    { top: 0; }
  .gingham.bottom { bottom: 0; }

  .sun { position: absolute; top: 130px; right: 40px; width: 120px; height: 120px; }

  .title-block { position: absolute; top: 130px; left: 36px; right: 36px; }
  .title-line  { font-weight: 900; font-size: 84px; line-height: 0.92; letter-spacing: -0.02em; }
  .title-line.t1 { color: var(--red); font-style: italic; }
  .title-line.t2 { color: var(--ink); margin-top: -4px; }
  .potluck {
    font-style: italic; font-weight: 600; font-size: 15px; line-height: 1.3;
    color: var(--leaf); margin-top: 10px; max-width: 380px;
  }

  .doodles-svg { position: absolute; top: 360px; left: 30px; width: 540px; height: 120px; }

  .date-block {
    position: absolute; top: 485px; left: 36px; right: 36px;
    background: var(--cream); border: 3px dashed var(--ink); border-radius: 14px;
    padding: 14px 22px;
    display: flex; align-items: center; justify-content: space-between; gap: 18px;
    box-sizing: border-box;
  }
  .day   { font-weight: 900; font-style: italic; font-size: 80px; line-height: 0.85; color: var(--ink); }
  .month { font-weight: 700; font-size: 15px; color: var(--red); margin-top: 4px; }
  .times { display: grid; grid-template-columns: auto auto; column-gap: 14px; row-gap: 3px; align-items: baseline; margin: 0; }
  .times dt { font-weight: 700; font-size: 11px; color: var(--ink); opacity: 0.6; text-transform: uppercase; letter-spacing: 0.14em; text-align: right; }
  .times dd { margin: 0; font-weight: 900; font-size: 24px; color: var(--ink); line-height: 1; letter-spacing: -0.01em; }
  .music { font-style: italic; font-weight: 600; font-size: 13px; color: var(--leaf); margin: 6px 0 0; text-align: right; }

  .place-row {
    position: absolute; bottom: 130px; left: 36px; right: 36px;
    display: flex; justify-content: space-between; align-items: center; gap: 16px;
  }
  .place-eyebrow { font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--red); margin-bottom: 6px; }
  .place-address { font-weight: 800; font-size: 22px; line-height: 1.15; color: var(--ink); }
  .place-contact { font-weight: 600; font-size: 12px; color: var(--ink); opacity: 0.7; margin-top: 6px; font-variant-numeric: tabular-nums; }
  .qr {
    background: #ffffff; padding: 16px; border: 2.5px solid var(--ink); border-radius: 10px;
    transform: rotate(3deg);
    box-shadow: 0 4px 0 rgba(42, 26, 19, 0.08);
  }
  .qr svg { display: block; }
</style>
</head>
