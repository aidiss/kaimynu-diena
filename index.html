<!doctype html>
<html lang="lt">
<head>
<meta charset="utf-8" />
<title>Kaimynų diena — Piknikas</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;0,9..144,800;0,9..144,900;1,9..144,600;1,9..144,700;1,9..144,800;1,9..144,900&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fff8ec;
    --red:   #d8412e;
    --ink:   #2a1a13;
    --sun:   #f4b53a;
    --leaf:  #3d8255;
    --wood:  #c98a48;
    --gingham: 16px;
  }

  html, body { margin: 0; padding: 0; min-height: 100%; background: #ede5d2; }
  body {
    font-family: "Fraunces", Georgia, serif;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 40px 20px;
    min-height: 100vh;
    box-sizing: border-box;
    color: var(--ink);
  }

  .stage {
    box-shadow: 0 30px 80px rgba(60, 30, 10, 0.18),
                0 8px 24px rgba(60, 30, 10, 0.10);
    border-radius: 4px;
    overflow: hidden;
    background: white;
    transform-origin: top center;
  }

  .flyer {
    width: 600px;
    height: 850px;
    position: relative;
    overflow: hidden;
    background: var(--cream);
    color: var(--ink);
    font-family: "Fraunces", Georgia, serif;
  }

  /* gingham bands */
  .gingham {
    position: absolute;
    left: 0; right: 0;
    height: 110px;
    background:
      repeating-linear-gradient(0deg,
        color-mix(in srgb, var(--red) 33%, transparent) 0 var(--gingham),
        transparent var(--gingham) calc(var(--gingham) * 2)),
      repeating-linear-gradient(90deg,
        color-mix(in srgb, var(--red) 33%, transparent) 0 var(--gingham),
        transparent var(--gingham) calc(var(--gingham) * 2)),
      var(--cream);
  }
  .gingham.top    { top: 0; }
  .gingham.bottom { bottom: 0; }

  /* sun (top right) */
  .sun {
    position: absolute;
    top: 130px;
    right: 40px;
    width: 120px;
    height: 120px;
  }

  /* title */
  .title-block {
    position: absolute;
    top: 130px;
    left: 36px;
    right: 36px;
  }
  .title-line {
    font-weight: 900;
    font-size: 84px;
    line-height: 0.92;
    letter-spacing: -0.02em;
  }
  .title-line.t1 { color: var(--red); font-style: italic; }
  .title-line.t2 { color: var(--ink); margin-top: -4px; }
  .potluck {
    font-style: italic;
    font-weight: 600;
    font-size: 15px;
    line-height: 1.3;
    color: var(--leaf);
    margin-top: 10px;
    max-width: 380px;
  }

  /* doodle row */
  .doodles {
    position: absolute;
    top: 360px;
    left: 30px;
    width: 540px;
    height: 120px;
  }

  /* date block */
  .date-block {
    position: absolute;
    top: 485px;
    left: 36px;
    right: 36px;
    background: var(--cream);
    border: 3px dashed var(--ink);
    border-radius: 14px;
    padding: 14px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    box-sizing: border-box;
  }
  .day {
    font-weight: 900;
    font-style: italic;
    font-size: 80px;
    line-height: 0.85;
    color: var(--ink);
  }
  .month {
    font-weight: 700;
    font-size: 15px;
    color: var(--red);
    margin-top: 4px;
  }
  .times {
    display: grid;
    grid-template-columns: auto auto;
    column-gap: 14px;
    row-gap: 3px;
    align-items: baseline;
  }
  .time-label {
    font-weight: 700;
    font-size: 11px;
    color: var(--ink);
    opacity: 0.6;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    text-align: right;
  }
  .time-value {
    font-weight: 900;
    font-size: 24px;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -0.01em;
  }
  .music {
    font-weight: 600;
    font-style: italic;
    font-size: 13px;
    color: var(--leaf);
    margin-top: 6px;
    text-align: right;
  }

  /* place + QR */
  .place-row {
    position: absolute;
    bottom: 130px;
    left: 36px;
    right: 36px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
  }
  .place {
    max-width: 320px;
  }
  .place-eyebrow {
    font-weight: 700;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--red);
    margin-bottom: 6px;
  }
  .place-address {
    font-weight: 800;
    font-size: 22px;
    line-height: 1.15;
    color: var(--ink);
  }
  .qr {
    background: var(--cream);
    padding: 8px;
    border: 2.5px solid var(--ink);
    border-radius: 8px;
    transform: rotate(3deg);
  }
  .qr svg { display: block; }

  /* print: full-bleed single A5 page */
  @page { size: A5 portrait; margin: 0; }
  @media print {
    html, body { background: white; padding: 0; }
    .stage { box-shadow: none; border-radius: 0; }
    .print-btn { display: none !important; }
  }

  .print-btn {
    position: fixed;
    right: 20px;
    bottom: 20px;
    appearance: none;
    border: 0;
    background: var(--ink);
    color: var(--cream);
    font: 600 13px/1 "Fraunces", Georgia, serif;
    padding: 12px 18px;
    border-radius: 999px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.18);
    cursor: pointer;
  }
  .print-btn:hover { background: #1a0f08; }
</style>
</head>
<body>

<div class="stage">
  <div class="flyer">

    <div class="gingham top"></div>
    <div class="gingham bottom"></div>

    <!-- sun -->
    <svg class="sun" viewBox="0 0 120 120" aria-hidden="true">
      <g transform="translate(60 60)">
        <rect x="-3" y="-55" width="6" height="14" fill="var(--sun)" transform="rotate(0)"   rx="2"/>
        <rect x="-3" y="-55" width="6" height="14" fill="var(--sun)" transform="rotate(30)"  rx="2"/>
        <rect x="-3" y="-55" width="6" height="14" fill="var(--sun)" transform="rotate(60)"  rx="2"/>
        <rect x="-3" y="-55" width="6" height="14" fill="var(--sun)" transform="rotate(90)"  rx="2"/>
        <rect x="-3" y="-55" width="6" height="14" fill="var(--sun)" transform="rotate(120)" rx="2"/>
        <rect x="-3" y="-55" width="6" height="14" fill="var(--sun)" transform="rotate(150)" rx="2"/>
        <rect x="-3" y="-55" width="6" height="14" fill="var(--sun)" transform="rotate(180)" rx="2"/>
        <rect x="-3" y="-55" width="6" height="14" fill="var(--sun)" transform="rotate(210)" rx="2"/>
        <rect x="-3" y="-55" width="6" height="14" fill="var(--sun)" transform="rotate(240)" rx="2"/>
        <rect x="-3" y="-55" width="6" height="14" fill="var(--sun)" transform="rotate(270)" rx="2"/>
        <rect x="-3" y="-55" width="6" height="14" fill="var(--sun)" transform="rotate(300)" rx="2"/>
        <rect x="-3" y="-55" width="6" height="14" fill="var(--sun)" transform="rotate(330)" rx="2"/>
        <circle r="32" fill="var(--sun)"/>
        <circle cx="-8" cy="-6" r="3" fill="var(--ink)"/>
        <circle cx="8"  cy="-6" r="3" fill="var(--ink)"/>
        <path d="M -9 6 Q 0 14 9 6" stroke="var(--ink)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </g>
    </svg>

    <!-- title -->
    <div class="title-block">
      <div class="title-line t1">Kaimynų</div>
      <div class="title-line t2">diena!</div>
      <div class="potluck">suneštinis vakarėlis · atsinešk vaišių pasidalinimui</div>
    </div>

    <!-- doodles -->
    <svg class="doodles" viewBox="0 0 540 120" aria-hidden="true">
      <!-- watermelon -->
      <g transform="translate(60 60)">
        <path d="M -50 0 A 50 50 0 0 1 50 0 Z" fill="var(--red)"/>
        <path d="M -50 0 A 50 50 0 0 1 50 0 Z" fill="none" stroke="var(--ink)" stroke-width="2.5"/>
        <path d="M -40 0 A 40 40 0 0 1 40 0" fill="var(--leaf)" opacity="0.25"/>
        <line x1="-50" y1="0" x2="50" y2="0" stroke="var(--ink)" stroke-width="2.5"/>
        <circle cx="-20" cy="-18" r="3" fill="var(--ink)"/>
        <circle cx="10"  cy="-26" r="3" fill="var(--ink)"/>
        <circle cx="22"  cy="-12" r="3" fill="var(--ink)"/>
      </g>
      <!-- guitar -->
      <g transform="translate(180 8)">
        <ellipse cx="0" cy="78" rx="26" ry="28" fill="var(--wood)" stroke="var(--ink)" stroke-width="2.5"/>
        <ellipse cx="0" cy="52" rx="18" ry="18" fill="var(--wood)" stroke="var(--ink)" stroke-width="2.5"/>
        <path d="M -18 56 Q 0 70 18 56 L 18 50 Q 0 60 -18 50 Z" fill="var(--wood)"/>
        <circle cx="0" cy="78" r="7" fill="var(--ink)"/>
        <circle cx="0" cy="78" r="4" fill="var(--wood)"/>
        <rect x="-9" y="92" width="18" height="3.5" fill="var(--ink)" rx="1"/>
        <rect x="-4" y="14" width="8" height="38" fill="#7a4a1e" stroke="var(--ink)" stroke-width="2"/>
        <line x1="-4" y1="22" x2="4" y2="22" stroke="var(--ink)" stroke-width="1"/>
        <line x1="-4" y1="30" x2="4" y2="30" stroke="var(--ink)" stroke-width="1"/>
        <line x1="-4" y1="38" x2="4" y2="38" stroke="var(--ink)" stroke-width="1"/>
        <line x1="-4" y1="46" x2="4" y2="46" stroke="var(--ink)" stroke-width="1"/>
        <path d="M -7 14 L 7 14 L 8 2 L -8 2 Z" fill="#7a4a1e" stroke="var(--ink)" stroke-width="2"/>
        <circle cx="-6" cy="6"  r="1.5" fill="var(--ink)"/>
        <circle cx="6"  cy="6"  r="1.5" fill="var(--ink)"/>
        <circle cx="-6" cy="11" r="1.5" fill="var(--ink)"/>
        <circle cx="6"  cy="11" r="1.5" fill="var(--ink)"/>
        <line x1="-2.5" y1="14" x2="-2.5" y2="92" stroke="var(--ink)" stroke-width="0.6"/>
        <line x1="0"    y1="14" x2="0"    y2="92" stroke="var(--ink)" stroke-width="0.6"/>
        <line x1="2.5"  y1="14" x2="2.5"  y2="92" stroke="var(--ink)" stroke-width="0.6"/>
      </g>
      <!-- balloon -->
      <g transform="translate(290 50)">
        <ellipse cx="0" cy="0" rx="28" ry="32" fill="var(--sun)" stroke="var(--ink)" stroke-width="2.5"/>
        <path d="M 0 32 L -3 38 L 3 38 Z" fill="var(--ink)"/>
        <path d="M 0 38 Q -6 60 4 70" stroke="var(--ink)" stroke-width="1.5" fill="none"/>
        <ellipse cx="-8" cy="-10" rx="5" ry="8" fill="var(--cream)" opacity="0.5"/>
      </g>
      <!-- music note -->
      <g transform="translate(400 50)">
        <circle cx="-10" cy="20" r="10" fill="var(--ink)"/>
        <circle cx="20"  cy="14" r="10" fill="var(--ink)"/>
        <line x1="0"  y1="20" x2="30" y2="14" stroke="var(--ink)" stroke-width="3"/>
        <line x1="0"  y1="20" x2="0"  y2="-10" stroke="var(--ink)" stroke-width="3"/>
        <line x1="30" y1="14" x2="30" y2="-16" stroke="var(--ink)" stroke-width="3"/>
        <path d="M 0 -10 Q 18 -14 30 -16" stroke="var(--ink)" stroke-width="3" fill="none"/>
      </g>
      <!-- cup -->
      <g transform="translate(480 60)">
        <path d="M -22 -20 L 22 -20 L 18 22 L -18 22 Z" fill="var(--red)" stroke="var(--ink)" stroke-width="2.5"/>
        <ellipse cx="0" cy="-20" rx="22" ry="6" fill="var(--cream)" stroke="var(--ink)" stroke-width="2.5"/>
        <path d="M 22 -10 Q 32 -8 32 4 Q 32 14 20 14" stroke="var(--ink)" stroke-width="2.5" fill="none"/>
      </g>
    </svg>

    <!-- date block -->
    <div class="date-block">
      <div>
        <div class="day">29</div>
        <div class="month">gegužės · penkt.</div>
      </div>
      <div>
        <div class="times">
          <div class="time-label">Durys</div>
          <div class="time-value">18:00</div>
          <div class="time-label">Pradžia</div>
          <div class="time-value">19:00</div>
        </div>
        <div class="music">♫ bus gyva muzika</div>
      </div>
    </div>

    <!-- place + QR -->
    <div class="place-row">
      <div class="place">
        <div class="place-eyebrow">← Užsuk pas mus</div>
        <div class="place-address">Renkamės priešais<br>Vaisvydo g. 40</div>
      </div>
      <div class="qr">
        <!-- decorative QR placeholder — swap for a real QR before printing -->
        <svg width="80" height="80" viewBox="0 0 25 25" aria-label="QR code placeholder">
          <!-- finder squares -->
          <g fill="#2a1a13">
            <!-- top-left -->
            <rect x="0" y="0" width="7" height="1.04"/>
            <rect x="0" y="6" width="7" height="1.04"/>
            <rect x="0" y="0" width="1.04" height="7"/>
            <rect x="6" y="0" width="1.04" height="7"/>
            <rect x="2" y="2" width="3" height="3"/>
            <!-- top-right -->
            <rect x="18" y="0" width="7" height="1.04"/>
            <rect x="18" y="6" width="7" height="1.04"/>
            <rect x="18" y="0" width="1.04" height="7"/>
            <rect x="24" y="0" width="1.04" height="7"/>
            <rect x="20" y="2" width="3" height="3"/>
            <!-- bottom-left -->
            <rect x="0" y="18" width="7" height="1.04"/>
            <rect x="0" y="24" width="7" height="1.04"/>
            <rect x="0" y="18" width="1.04" height="7"/>
            <rect x="6" y="18" width="1.04" height="7"/>
            <rect x="2" y="20" width="3" height="3"/>
            <!-- alignment pattern bottom-right -->
            <rect x="16" y="16" width="5" height="1.04"/>
            <rect x="16" y="20" width="5" height="1.04"/>
            <rect x="16" y="16" width="1.04" height="5"/>
            <rect x="20" y="16" width="1.04" height="5"/>
            <rect x="18" y="18" width="1.04" height="1.04"/>
            <!-- noise pattern -->
            <rect x="8"  y="1"  width="1.04" height="1.04"/>
            <rect x="10" y="2"  width="1.04" height="1.04"/>
            <rect x="12" y="0"  width="1.04" height="1.04"/>
            <rect x="14" y="3"  width="1.04" height="1.04"/>
            <rect x="9"  y="4"  width="1.04" height="1.04"/>
            <rect x="11" y="5"  width="1.04" height="1.04"/>
            <rect x="15" y="5"  width="1.04" height="1.04"/>
            <rect x="13" y="6"  width="1.04" height="1.04"/>
            <rect x="8"  y="8"  width="1.04" height="1.04"/>
            <rect x="10" y="9"  width="1.04" height="1.04"/>
            <rect x="12" y="10" width="1.04" height="1.04"/>
            <rect x="14" y="11" width="1.04" height="1.04"/>
            <rect x="16" y="9"  width="1.04" height="1.04"/>
            <rect x="18" y="10" width="1.04" height="1.04"/>
            <rect x="20" y="9"  width="1.04" height="1.04"/>
            <rect x="22" y="11" width="1.04" height="1.04"/>
            <rect x="1"  y="9"  width="1.04" height="1.04"/>
            <rect x="3"  y="11" width="1.04" height="1.04"/>
            <rect x="5"  y="9"  width="1.04" height="1.04"/>
            <rect x="2"  y="12" width="1.04" height="1.04"/>
            <rect x="4"  y="13" width="1.04" height="1.04"/>
            <rect x="6"  y="15" width="1.04" height="1.04"/>
            <rect x="9"  y="12" width="1.04" height="1.04"/>
            <rect x="11" y="13" width="1.04" height="1.04"/>
            <rect x="13" y="14" width="1.04" height="1.04"/>
            <rect x="15" y="13" width="1.04" height="1.04"/>
            <rect x="17" y="14" width="1.04" height="1.04"/>
            <rect x="19" y="13" width="1.04" height="1.04"/>
            <rect x="21" y="14" width="1.04" height="1.04"/>
            <rect x="23" y="13" width="1.04" height="1.04"/>
            <rect x="8"  y="16" width="1.04" height="1.04"/>
            <rect x="10" y="17" width="1.04" height="1.04"/>
            <rect x="12" y="18" width="1.04" height="1.04"/>
            <rect x="14" y="19" width="1.04" height="1.04"/>
            <rect x="9"  y="20" width="1.04" height="1.04"/>
            <rect x="11" y="21" width="1.04" height="1.04"/>
            <rect x="13" y="22" width="1.04" height="1.04"/>
            <rect x="15" y="23" width="1.04" height="1.04"/>
            <rect x="22" y="22" width="1.04" height="1.04"/>
            <rect x="23" y="23" width="1.04" height="1.04"/>
            <rect x="22" y="24" width="1.04" height="1.04"/>
            <rect x="3"  y="22" width="1.04" height="1.04"/>
            <rect x="5"  y="23" width="1.04" height="1.04"/>
          </g>
        </svg>
      </div>
    </div>

  </div>
</div>

<button class="print-btn" onclick="window.print()">Spausdinti / PDF</button>

<script>
  // zoom-to-fit on viewports narrower than 600px
  (function () {
    var stage = document.querySelector('.stage');
    if (!stage) return;
    function fit() {
      var vw = window.innerWidth - 40;
      var s = Math.min(1, vw / 600);
      stage.style.transform = 'scale(' + s + ')';
      stage.style.marginBottom = s < 1 ? ((s - 1) * 850) + 'px' : '';
    }
    fit();
    window.addEventListener('resize', fit);
  })();
</script>

</body>
</html>
